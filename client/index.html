<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- CEP panel is local-only for the MVP; restrict to self + inline styles.
       (No remote loads — see CLAUDE.md "CSP in the panel".) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Kinea</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="panel">
    <header class="panel__head">
      <div class="panel__titlebar">
        <h1 class="panel__title">Kinea</h1>
        <div class="mode" role="tablist" aria-label="Mode">
          <button id="mode-chat" class="mode__btn mode__btn--active" type="button" role="tab" aria-selected="true">Chat</button>
          <button id="mode-agent" class="mode__btn" type="button" role="tab" aria-selected="false">Agent</button>
        </div>
      </div>
      <div class="toolbar">
        <label class="field">
          <span class="field__label">Provider</span>
          <select id="provider-select" class="select" aria-label="Provider"></select>
        </label>
        <label class="field">
          <span class="field__label">Model</span>
          <select id="model-select" class="select" aria-label="Model"></select>
        </label>
      </div>
    </header>

    <section class="panel__body">
      <div id="chat-log" class="chat-log" aria-live="polite">
        <div class="chat-msg chat-msg--kinea" id="intro-msg">Chat Mode (read-only). Ask about your
          comp, effects, or expressions. Kinea sees your active composition.</div>
      </div>

      <div class="chat-input">
        <textarea id="chat-input" class="chat-input__field" rows="2"
                  placeholder="Ask Kinea… (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="btn-send" class="btn btn--primary" type="button">Send</button>
      </div>

      <details class="devtools">
        <summary>Dev tools</summary>
        <div class="panel__actions">
          <button id="btn-ping" class="btn btn--ghost" type="button">Ping host</button>
          <button id="btn-context" class="btn btn--ghost" type="button">Read context</button>
          <button id="btn-detect" class="btn btn--ghost" type="button">Detect Gemini</button>
          <button id="btn-solid" class="btn btn--ghost" type="button">Create red solid</button>
          <button id="btn-test-rename" class="btn btn--ghost" type="button">Test rename (sel→KineaTest)</button>
          <button id="btn-describe" class="btn btn--ghost" type="button">Describe layer (sel)</button>
          <button id="btn-list-effects" class="btn btn--ghost" type="button">List effects (sel)</button>
        </div>
        <div class="devtools__sims">
          <label><input type="checkbox" id="sim-ratelimit" /> Simulate rate limit (next send)</label>
          <label><input type="checkbox" id="sim-destructive" /> Simulate destructive plan</label>
        </div>
      </details>
    </section>

    <footer class="panel__foot">
      <pre id="status" class="status" aria-live="polite">Ready.</pre>
    </footer>
  </main>

  <!-- Adobe-provided global; defines window.CSInterface. Must load before main.js. -->
  <script src="./lib/CSInterface.js"></script>
  <!-- Classic script (NOT type="module"): native ES modules are fetched with
       CORS and silently fail from the file:// origin CEP uses. No bundler, so
       we use plain scripts + globals. -->
  <script src="./js/main.js"></script>
</body>
</html>
